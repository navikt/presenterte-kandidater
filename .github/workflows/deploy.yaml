name: Bygg og Deploy NextJS
on:
  push:
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Next
    uses: navikt/toi-github-actions-workflows/.github/workflows/build-and-deploy-nextjs.yaml@v11.2
    with:
      dev-vars-path: '.nais/dev-gcp.json'
      prod-vars-path: '.nais/prod-gcp.json'
      deploy-dev-branch: 'update'
      a11y-command: 'pnpm a11y'
      playwright-command: 'pnpm test'
      playwright-snapshots: true
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      security-events: write
      pages: write
